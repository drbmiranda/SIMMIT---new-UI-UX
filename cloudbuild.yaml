steps:
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', '${_IMAGE}', '.']

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_IMAGE}']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      [
        'gcloud',
        'run',
        'deploy',
        '${_SERVICE}',
        '--image',
        '${_IMAGE}',
        '--region',
        '${_REGION}',
        '--platform',
        'managed',
        '--allow-unauthenticated',
        '--set-secrets',
        'VITE_GEMINI_API_KEY=${_SECRET_GEMINI_API_KEY}:latest,VITE_SUPABASE_URL=${_SECRET_SUPABASE_URL}:latest,VITE_SUPABASE_ANON_KEY=${_SECRET_SUPABASE_ANON_KEY}:latest'
      ]

images:
  - '${_IMAGE}'

substitutions:
  _SERVICE: 'simmit-design'
  _REGION: 'us-central1'
  _AR_REPO: 'simmit-images'
  _IMAGE: '${_REGION}-docker.pkg.dev/$PROJECT_ID/${_AR_REPO}/${_SERVICE}:$SHORT_SHA'
  _SECRET_GEMINI_API_KEY: 'simmit-gemini-api-key'
  _SECRET_SUPABASE_URL: 'simmit-supabase-url'
  _SECRET_SUPABASE_ANON_KEY: 'simmit-supabase-anon-key'

options:
  logging: CLOUD_LOGGING_ONLY
