steps:
  - name: 'node:20'
    entrypoint: 'bash'
    args:
      - '-c'
      - |
        npm ci
        npm run build
    env:
      - 'VITE_GEMINI_API_KEY=${_VITE_GEMINI_API_KEY}'
      - 'VITE_SUPABASE_URL=${_VITE_SUPABASE_URL}'
      - 'VITE_SUPABASE_ANON_KEY=${_VITE_SUPABASE_ANON_KEY}'

  - name: 'gcr.io/cloud-builders/docker'
    args:
      [
        'build',
        '-t',
        '${_IMAGE}',
        '--build-arg',
        'VITE_GEMINI_API_KEY=${_VITE_GEMINI_API_KEY}',
        '--build-arg',
        'VITE_SUPABASE_URL=${_VITE_SUPABASE_URL}',
        '--build-arg',
        'VITE_SUPABASE_ANON_KEY=${_VITE_SUPABASE_ANON_KEY}',
        '.'
      ]

  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', '${_IMAGE}']

  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    args:
      [
        'gcloud',
        'run',
        'deploy',
        '${_SERVICE}',
        '--image',
        '${_IMAGE}',
        '--region',
        '${_REGION}',
        '--platform',
        'managed',
        '--allow-unauthenticated'
      ]

images:
  - '${_IMAGE}'

substitutions:
  _SERVICE: 'medsim-beta'
  _REGION: 'us-central1'
  _IMAGE: 'gcr.io/$PROJECT_ID/medsim-beta'
